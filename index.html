<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }
        .app-card {
            width: 100%;
            max-width: 380px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* আভাটার ও অ্যানিমেশন স্টাইল */
        .avatar-box {
            width: 260px;
            height: 320px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            margin-bottom: 15px;
            position: relative;
        }
        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }
        .talking {
            animation: pulse-border 1.2s infinite alternate;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 15px rgba(255, 121, 198, 0.4); border-color: #ff79c6; }
            100% { box-shadow: 0 0 30px rgba(255, 121, 198, 0.9); border-color: #ff79c6; }
        }

        .api-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #7ee787;
            font-size: 11px;
            outline: none;
            text-align: center;
        }

        .status-badge {
            font-size: 13px;
            color: #ff79c6;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .chat-box {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            height: 120px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .user-msg { color: #58a6ff; margin-bottom: 6px; }
        .ai-msg { color: #7ee787; margin-bottom: 6px; }

        .controls { display: flex; gap: 8px; width: 100%; }
        input.msg-input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
            font-size: 14px;
        }
        button {
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 16px;
        }
        .send-btn { background: #1f6feb; color: white; }
        .mic-btn { background: #ea4435; color: white; font-size: 16px; }
    </style>
</head>
<body>

<div class="app-card">
    <!-- সারা অ্যানিমে আভাটার -->
    <div class="avatar-box" id="avatarBox">
        <img id="saraImg" src="https://i.ibb.co/L5fX03y/sara.jpg" alt="Sara AI">
    </div>

    <!-- Gemini API Key (এখানে নিজের Key বসালে ১ সেকেন্ডে কাজ করবে) -->
    <input type="password" id="apiKey" class="api-input" placeholder="এখানে Gemini API Key পেস্ট করো">

    <div id="status" class="status-badge">✨ সারা প্রস্তুত!</div>

    <!-- চ্যাট ইতিহাস -->
    <div class="chat-box" id="chatBox">
        <div class="ai-msg"><b>সারা:</b> হাই প্রীতম! কিছু বলো, আমি শুনছি...</div>
    </div>

    <!-- ইনপুট ও কন্ট্রোল -->
    <div class="controls">
        <input type="text" id="userInput" class="msg-input" placeholder="মেসেজ লেখো..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">পাঠাও</button>
        <button class="mic-btn" onclick="startListening()">🎙️</button>
    </div>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const chatBox = document.getElementById('chatBox');
    const inputField = document.getElementById('userInput');
    const apiKeyField = document.getElementById('apiKey');
    const saraImg = document.getElementById('saraImg');
    const avatarBox = document.getElementById('avatarBox');

    // ছবি ও জিপ অ্যানিমেশন লিঙ্ক
    const idleImg = "https://i.ibb.co/L5fX03y/sara.jpg"; 
    const talkingGif = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbm94OHR4ZnR5ZXJ1ZG0zeHZhZmt1eXJ0YnVxbzZhMHF4aXg0ZnRhYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKSjRrfIPjeiVyM/giphy.gif";

    // ১. কথা বলা ও অ্যানিমেশন কন্ট্রোল
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bn-IN';
            utterance.rate = 0.95;
            utterance.pitch = 1.2;

            utterance.onstart = () => { 
                statusDiv.innerText = "🗣️ সারা বলছে...";
                saraImg.src = talkingGif; // কথা বলার সময় GIF চলবে (নড়াচড়া করবে)
                avatarBox.classList.add('talking');
            };

            utterance.onend = () => { 
                statusDiv.innerText = "✨ সারা প্রস্তুত!";
                saraImg.src = idleImg; // থামলে স্থির ছবি হয়ে যাবে
                avatarBox.classList.remove('talking');
            };

            window.speechSynthesis.speak(utterance);
        }
    }

    // ২. AI উত্তর জেনারেট করা
    async function sendMsg() {
        const text = inputField.value.trim();
        const key = apiKeyField.value.trim();

        if (!text) return;
        if (!key) {
            alert("অনুগ্রহ করে ওপরের বক্সে তোমার Gemini API Key-টি পেস্ট করো!");
            return;
        }

        chatBox.innerHTML += `<div class="user-msg"><b>তুমি:</b> ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        inputField.value = '';
        statusDiv.innerText = "🤔 সারা চিন্তা করছে...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: text + " (উত্তরটি ১-২ লাইনে খুব সুন্দর ও মিষ্টি করে বাংলা ভাষায় দাও)" }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const reply = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="ai-msg"><b>সারা:</b> ${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                speakText(reply);
            } else {
                chatBox.innerHTML += `<div class="ai-msg" style="color:red">❌ API Key ভুল বা ইনভ্যালিড!</div>`;
                statusDiv.innerText = "❌ এরর";
            }
        } catch (err) {
            chatBox.innerHTML += `<div class="ai-msg" style="color:red">❌ কানেকশন প্রবলেম!</div>`;
            statusDiv.innerText = "❌ এরর";
        }
    }

    // ৩. ভয়েস ইনপুট (মাইক)
    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("তোমার এই ব্রাউজারে ভয়েস সাপোর্ট নেই, টাইপ করে পাঠাও।");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'bn-IN';
        statusDiv.innerText = "🎧 সারা শুনছে, বলো...";
        recognition.start();

        recognition.onresult = (event) => {
            inputField.value = event.results[0][0].transcript;
            sendMsg();
        };

        recognition.onerror = () => {
            statusDiv.innerText = "❌ মাইক এরর!";
        };
    }
</script>

</body>
</html>
